name: Build and deploy Node.js app to Azure Web App - climberbook

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Prepare standalone artifact
        run: |
          cp -r .next/static .next/standalone/.next/static
          if [ -d public ]; then cp -r public .next/standalone/public; fi
          npm pkg set scripts.start="node server.js" --prefix .next/standalone

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .next/standalone
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Verify standalone artifact
        run: |
          test -f server.js
          test -f .next/BUILD_ID
          test -d .next/server
          ls -la
          ls -la .next

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F045372C347146459DE73694D4D6CEA4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9E6E4952A0EC49A4A3E63100613BB0FC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FE245DDB25684B03B4A7E2B05478AC2C }}

      - name: Configure and start Azure Web App
        run: |
          az webapp config set --resource-group rm_gmarcinek --name climberbook --startup-file "node server.js"
          az webapp start --resource-group rm_gmarcinek --name climberbook
          az webapp show --resource-group rm_gmarcinek --name climberbook --query "{state:state, enabled:enabled, availabilityState:availabilityState, hostNamesDisabled:hostNamesDisabled, usageState:usageState, defaultHostName:defaultHostName}" --output json
          az webapp config show --resource-group rm_gmarcinek --name climberbook --query "{linuxFxVersion:linuxFxVersion, appCommandLine:appCommandLine, alwaysOn:alwaysOn}" --output json
          state=$(az webapp show --resource-group rm_gmarcinek --name climberbook --query state --output tsv)
          usage_state=$(az webapp show --resource-group rm_gmarcinek --name climberbook --query usageState --output tsv)
          if [ "$state" = "QuotaExceeded" ] || [ "$usage_state" = "Exceeded" ]; then
            echo "App Service quota exceeded; OneDeploy will be rejected with Site Disabled (403). Wait for quota reset or move the app to a paid App Service plan."
            exit 1
          fi

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: climberbook
          slot-name: Production
          package: .
